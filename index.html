<!doctype html>
<html lang="ko">

<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="IOTA Seoul" />
    <title>IOTA Seoul CFT</title>
    <!-- Prevent search engine indexing during legal review -->
    <meta name="robots" content="noindex, nofollow" />

    <link rel="stylesheet" as="style" href="/fonts/Pretendard/pretendard.css" />

    <script>
        (function () {
            var capacitor = window.Capacitor;
            var isNativeApp = location.protocol === 'capacitor:'
                || location.protocol === 'ionic:'
                || Boolean(capacitor && capacitor.isNativePlatform && capacitor.isNativePlatform());

            if (isNativeApp) return;

            document.head.insertAdjacentHTML('beforeend', [
                '<link rel="preload" href="./img/logo_white.png" as="image" />',
                '<link rel="preload" href="./img/foster+partners.jpg" as="image" />',
                '<link rel="preload" href="./img/iota_full.jpg" as="image" />',
                '<link rel="preload" href="./img/iota_full_3.jpg" as="image" />',
                '<link rel="preconnect" href="https://fonts.googleapis.com">',
                '<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>',
                '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;700&display=swap" rel="stylesheet">',
                '<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">'
            ].join(''));

            var analyticsScript = document.createElement('script');
            analyticsScript.async = true;
            analyticsScript.src = 'https://www.googletagmanager.com/gtag/js?id=G-QNHPD2C1K4';
            document.head.appendChild(analyticsScript);

            window.dataLayer = window.dataLayer || [];
            window.gtag = function () { window.dataLayer.push(arguments); };
            window.gtag('js', new Date());
            window.gtag('config', 'G-QNHPD2C1K4');
        })();
    </script>

    <script>
        if (navigator.userAgent.indexOf('Win') !== -1) {
            document.documentElement.classList.add('is-windows');
        }
        
        // FOUC (Flash of Unstyled Content) Prevention for Dark Mode
        try {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || !theme) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        } catch (_) {}

        // GitHub Pages SPA redirect restoration
        // Restores path from ?p= query param set by 404.html
        (function() {
            var search = location.search;
            if (search && search.indexOf('?p=') === 0) {
                var decoded = search.slice(3).replace(/~and~/g, '&');
                var qIdx = decoded.indexOf('&q=');
                var path = qIdx >= 0 ? decoded.slice(0, qIdx) : decoded;
                var query = qIdx >= 0 ? '?' + decoded.slice(qIdx + 3) : '';
                // Remove trailing slash and index.html from pathname to avoid path corruption
                var base = location.pathname.split('?')[0].replace(/index\.html$/, '').replace(/\/$/, '');
                history.replaceState(null, null, base + path + query + location.hash);
            }
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
