name: igis_fund_mobile
description: "IOTA Seoul CFT mobile client."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.12.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  flutter_svg: ^2.0.10
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.3.4
  flutter_markdown: ^0.7.7+1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  assets:
    - assets/iota_seoul_home_v2.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon_iota.png"
  adaptive_icon_background: "icon_iota.png"
  adaptive_icon_foreground: "icon_iota.png"
